<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0d120e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cedriambar" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>Cedriambar — Gestão de Stock</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar__mark" aria-hidden="true">
        <img src="/icons/mark-topbar.png" alt="" />
      </div>
      <div class="topbar__title">
        <span class="topbar__title-main">Cedriambar</span>
        <span class="topbar__title-sub" id="connection-status">a ligar…</span>
      </div>
      <button class="topbar__refresh" id="refresh-btn" aria-label="Atualizar dados">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M17.65 6.35A8 8 0 1 0 19.4 14h-2.1a6 6 0 1 1-1.4-6.2L13 10.5h7.5V3l-2.85 3.35Z" fill="currentColor"/></svg>
      </button>
    </header>

    <!-- Views are toggled via [data-view] -->
    <main class="views">

      <!-- SCAN VIEW -->
      <section class="view" data-view="scan" data-active="true">
        <div class="scan-stage" id="scan-stage">
          <video id="scan-video" playsinline muted></video>
          <div class="scan-frame" aria-hidden="true">
            <span class="scan-frame__corner scan-frame__corner--tl"></span>
            <span class="scan-frame__corner scan-frame__corner--tr"></span>
            <span class="scan-frame__corner scan-frame__corner--bl"></span>
            <span class="scan-frame__corner scan-frame__corner--br"></span>
          </div>
          <div class="scan-hint" id="scan-hint">Aponte a câmara ao código QR</div>
          <button class="scan-start" id="scan-start-btn">
            <svg viewBox="0 0 24 24" width="28" height="28"><path d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zM4 14h2v4h4v2H4v-6zm16 0h2v6h-6v-2h4v-4z" fill="currentColor"/></svg>
            <span>Iniciar câmara</span>
          </button>
        </div>
        <div class="manual-entry">
          <span class="manual-entry__label">ou digite o SKU</span>
          <form id="manual-form" class="manual-entry__form">
            <input type="text" id="manual-sku" placeholder="ex. 01101100" autocomplete="off" autocapitalize="off" />
            <button type="submit">Ir</button>
          </form>
        </div>
      </section>

      <!-- ITEM VIEW -->
      <section class="view" data-view="item">
        <div class="item-detail" id="item-detail"><!-- populated by app.js --></div>
      </section>

      <!-- BROWSE VIEW -->
      <section class="view" data-view="browse">
        <div class="browse">
          <div class="browse__search">
            <input type="text" id="browse-search" placeholder="Procurar por SKU, família ou descrição…" autocomplete="off" />
          </div>
          <div class="browse__list" id="browse-list"><!-- populated by app.js --></div>
        </div>
      </section>

    </main>

    <!-- Bottom tab bar -->
    <nav class="tabbar">
      <button class="tabbar__btn" data-goto="scan" aria-label="Digitalizar">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zM4 14h2v4h4v2H4v-6zm16 0h2v6h-6v-2h4v-4z" fill="currentColor"/></svg>
        <span>Digitalizar</span>
      </button>
      <button class="tabbar__btn" data-goto="browse" aria-label="Inventário">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 5h16v2H4V5zm0 6h16v2H4v-2zm0 6h16v2H4v-2z" fill="currentColor"/></svg>
        <span>Inventário</span>
      </button>
    </nav>

    <!-- Toast for feedback -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
